substitutions:
  device_name: "athom-ls-4p-4wire"
  project_name: "China Athom Technology.LS 4P 4Wire"
  project_version: "1.1.2"
  button_toggle: "true"
  light_restore_mode: RESTORE_DEFAULT_OFF
  number_of_leds: '150'
  led_chipset: WS2801
  led_rgb_order: GRB

esphome:
  name: "${device_name}"
  friendly_name: ""
  name_add_mac_suffix: true
  min_version: 2024.6.0
  project:
    name: "${project_name}"
    version: "${project_version}"
  platformio_options:
    board_upload.flash_size: 2MB
    board_upload.maximum_size: 2097152
    board_build.ldscript: eagle.flash.2m.ld

esp8266:
  board: esp8285
  restore_from_flash: true
  framework:
    version: 2.7.4
    
api:

ota:
  - platform: esphome
    id: ota_esphome_id

logger:
  baud_rate: 0

web_server:
  port: 80

wifi:
  ap: {} # This spawns an AP with the device name and mac address with no password.

mdns:
  disabled: false

captive_portal:

dashboard_import:
  package_import_url: github://athom-tech/athom-configs/athom-ls-4p-4wire.yaml

binary_sensor:
  - platform: status
    name: "Status"
    id: status_sensor

  - platform: gpio
    pin:
      number: 0
      mode: INPUT_PULLUP
      inverted: true
    name: "Power Button"
    id: power_button
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
            - light.toggle: leds
      - timing:
          - ON for at least 4s
        then:
          - button.press: factory_reset_button

sensor:
  - platform: uptime
    id: uptime_sensor
    name: "Uptime Sensor"

  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal"
    update_interval: 60s

button:
  - platform: factory_reset
    name: "Reset"
    id: factory_reset_button

  - platform: safe_mode
    name: "Safe Mode"
    id: safe_mode_button
    internal: false
    
power_supply:
  - id: relay
    pin: GPIO12

light:
  - platform: fastled_spi
    data_pin: GPIO1
    clock_pin: GPIO3
    id: leds
    name: "Light strip controller"
    power_supply: relay
    chipset: ${led_chipset}
    num_leds: ${number_of_leds}
    rgb_order: ${led_rgb_order}
    restore_mode: ${light_restore_mode}
    effects:
      - addressable_rainbow:
      - addressable_scan:

text_sensor:
  - platform: wifi_info
    id: wifi_info_text
    ip_address:
      id: ip_address_text
      name: "IP Address"
    ssid:
      id: ssid_text
      name: "Connected SSID"
    mac_address:
      id: mac_address_text
      name: "MAC Address"

time:
  - platform: sntp
    id: sntp_time

substitutions:
  device_name: "athom-ls-4p-3wire"
  project_name: "China Athom Technology.LS 4P 3Wire"
  project_version: "1.1.3"
  button_toggle: "true"
  led_restore_mode: RESTORE_DEFAULT_OFF
  number_of_leds: '150'
  led_rgb_order: GRB
  led_chipset: WS2811

esphome:
  name: "${device_name}"
  friendly_name: ""
  name_add_mac_suffix: true
  min_version: 2026.6.0
  platformio_options:
    board_upload.flash_size: 2MB
    board_upload.maximum_size: 2097152
    board_build.ldscript: eagle.flash.2m.ld
  project:
    name: "${project_name}"
    version: "${project_version}"

esp8266:
  board: esp8285
  restore_from_flash: true
  framework:
    version: 2.7.4

api:

ota:
  - platform: esphome
  # Enables OTA firmware flashing from a URL (used by the update component below)
  - platform: http_request

# Required by the ota http_request platform and the update component.
# verify_ssl: false skips TLS cert validation to reduce heap/RAM pressure during
# the download; the manifest's MD5 still verifies firmware integrity before flashing.
http_request:
  verify_ssl: false

update:
  # Managed updates via HTTP request: periodically checks the published manifest
  # and exposes a "Firmware Update" entity, pointing at this device's GitHub Pages
  # manifest. Pages URLs avoid the redirect/buffer issues of Release download URLs.
  - platform: http_request
    name: "Firmware Update"
    source: https://athom-tech.github.io/athom-configs/firmware/athom-ls-4p-3wire.manifest.json
    # update_interval defaults to 6h (how often it checks, not installs)

logger:
  baud_rate: 0

web_server:
  port: 80

wifi:
  ap: {} # This spawns an AP with the device name and mac address with no password.

mdns:
  disabled: false

captive_portal:

dashboard_import:
  package_import_url: github://athom-tech/athom-configs/athom-ls-4p-3wire.yaml

binary_sensor:
  - platform: status
    name: "Status"

  - platform: gpio
    pin:
      number: 0
      mode: INPUT_PULLUP
      inverted: true
    name: "Power Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - light.toggle: leds
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

button:
  - platform: factory_reset
    name: "Reset"
    id: Reset

  - platform: safe_mode
    name: "Safe Mode"
    internal: false

power_supply:
  - id: relay
    pin: GPIO12

light:
  - platform: fastled_clockless
    pin: GPIO1
    id: leds
    name: "Light strip controller"
    power_supply: relay
    chipset: ${led_chipset}
    num_leds: ${number_of_leds}
    rgb_order: ${led_rgb_order}
    restore_mode: ${led_restore_mode}
    effects:
      - addressable_rainbow:
      - addressable_scan:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "Mac Address"

time:
  - platform: sntp
    id: sntp_time
